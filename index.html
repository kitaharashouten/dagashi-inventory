<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>だがし在庫管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#222;min-height:100vh}

/* ===== モバイル ===== */
.app-shell{max-width:480px;margin:0 auto;padding:0.75rem;min-height:100vh}
.app-header{font-size:18px;font-weight:500;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.sync-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#fef9e8;color:#b45309;border:1px solid #b45309;margin-left:auto}
.sync-badge.ok{background:#e8fef0;color:#057a55;border-color:#057a55}
.sync-badge.err{background:#fef2f2;color:#dc2626;border-color:#dc2626}
.tab-bar{display:flex;gap:6px;margin-bottom:1rem}
.sidebar{display:none}
.tab{flex:1;padding:8px 4px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#888;cursor:pointer;text-align:center;transition:all .15s}
.tab.active{background:#eee;color:#222;font-weight:500;border-color:#999}
.section{display:none}.section.active{display:block}

/* ===== PC ===== */
@media(min-width:768px){
  body{display:flex;flex-direction:column}
  .app-shell{max-width:100%;padding:0;display:flex;flex-direction:column;height:100vh}
  .app-header{padding:1rem 1.5rem;font-size:20px;border-bottom:1px solid #e0e0e0;background:#fff;margin-bottom:0;flex-shrink:0}
  .main-body{display:flex;flex:1;overflow:hidden}
  .sidebar{width:160px;flex-shrink:0;background:#fff;border-right:1px solid #e0e0e0;padding:1rem 0.75rem;display:flex;flex-direction:column;gap:6px}
  .tab-bar{display:none}
  .sidebar .tab{flex:none;width:100%;padding:10px 12px;font-size:14px;border-radius:8px;text-align:left}
  .content-area{flex:1;overflow-y:auto;padding:1.5rem;background:#f5f5f0}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .form-col{display:flex;flex-direction:column;gap:0}
  #il{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:0.75rem}
  #cl{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:0.75rem}
  .content-area::-webkit-scrollbar{width:6px}
  .content-area::-webkit-scrollbar-track{background:transparent}
  .content-area::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
}

/* ===== カード ===== */
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:0.75rem}
@media(min-width:768px){.card{margin-bottom:0}}
.lbl{font-size:12px;color:#888;margin-bottom:4px}
.img-upload{border:1px dashed #bbb;border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;color:#888;font-size:13px;position:relative;overflow:hidden}
.img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload img{max-width:100%;max-height:120px;object-fit:contain;border-radius:8px}
input[type=text],select{width:100%;margin-bottom:0.75rem;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:14px;background:#fff;color:#222}
input[type=text]:focus,select:focus{outline:none;border-color:#888}
.mic-btn{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;background:#f5f5f5;color:#888;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:0.75rem}
.mic-btn.rec{background:#fef2f2;color:#dc2626;border-color:#dc2626;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.save-btn{width:100%;padding:12px;border-radius:8px;background:#222;border:none;color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-top:0.5rem}
.save-btn:hover{background:#444}
.save-btn:disabled{background:#aaa;cursor:not-allowed}
.cancel-btn{width:100%;padding:10px;border-radius:8px;background:#fff;border:1px solid #ccc;color:#888;font-size:14px;cursor:pointer;margin-top:0.5rem}
.cancel-btn:hover{background:#f5f5f5;color:#444}
@media(min-width:768px){.save-btn,.cancel-btn{max-width:320px}}
.item-actions{display:flex;gap:6px;margin-top:8px}
.edit-btn{padding:5px 12px;border-radius:6px;border:1px solid #ccc;background:#f5f5f5;color:#555;font-size:12px;cursor:pointer}
.edit-btn:hover{background:#e8f0fe;color:#1a73e8;border-color:#1a73e8}
.del-btn{padding:5px 12px;border-radius:6px;border:1px solid #fcc;background:#fff5f5;color:#dc2626;font-size:12px;cursor:pointer}
.del-btn:hover{background:#fef2f2;border-color:#dc2626}
.move-btn{padding:4px 10px;border-radius:6px;border:1px solid #ccc;background:#f5f5f5;color:#555;font-size:11px;cursor:pointer;white-space:nowrap}
.move-btn:hover{background:#fff3e0;color:#e65100;border-color:#e65100}
.del-var-btn{padding:4px 10px;border-radius:6px;border:1px solid #fcc;background:#fff5f5;color:#dc2626;font-size:11px;cursor:pointer;white-space:nowrap}
.del-var-btn:hover{background:#fef2f2;border-color:#dc2626}
.del-var-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:13px;padding:10px 14px;border-radius:10px;display:none;align-items:center;gap:10px;z-index:300;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.del-var-toast.show{display:flex}
.del-var-ok{padding:5px 14px;border-radius:6px;background:#dc2626;color:#fff;border:none;font-size:12px;cursor:pointer}
.del-var-cancel{padding:5px 14px;border-radius:6px;background:transparent;color:#bbb;border:1px solid #555;font-size:12px;cursor:pointer}

/* ===== 場所移動シート ===== */
.move-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.move-sheet{background:#fff;border-radius:16px 16px 0 0;padding:20px 16px 36px;width:100%;max-width:520px}
.move-sheet-title{font-size:15px;font-weight:500;color:#222;margin-bottom:4px}
.move-sheet-sub{font-size:12px;color:#888;margin-bottom:14px}
.move-loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.move-chip{border:2px solid #e0e0e0;border-radius:10px;padding:10px;text-align:center;cursor:pointer;background:#f9f9f9;transition:all .12s;user-select:none}
.move-chip:hover{border-color:#aaa}
.move-chip.selected{border-color:#4caf50;background:#f0faf0}
.move-chip.selected .move-chip-name{color:#2e7d32}
.move-chip.disabled{opacity:0.35;pointer-events:none}
.move-chip-name{font-size:13px;font-weight:500;color:#555}
.move-chip-check{font-size:11px;color:#4caf50;min-height:14px;margin-top:2px}
.move-confirm-btn{width:100%;padding:11px;background:#222;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.move-confirm-btn:disabled{background:#aaa;cursor:not-allowed}
.move-cancel-btn{width:100%;padding:8px;background:transparent;color:#888;border:none;font-size:13px;cursor:pointer;margin-top:6px}
.move-toast{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:#222;color:#fff;font-size:13px;padding:8px 16px;border-radius:8px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:300}
.move-toast.show{opacity:1}
.move-qty-section{background:#f5f5f0;border-radius:8px;padding:12px;margin-bottom:12px;display:none}
.move-qty-label{font-size:12px;color:#888;margin-bottom:8px}
.move-qty-row{display:flex;align-items:center;gap:10px}
.move-qty-num{font-size:22px;font-weight:500;min-width:36px;text-align:center}
.move-qty-max{font-size:11px;color:#aaa;margin-top:6px}

/* ===== 場所チップ ===== */
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.loc-chip{border:2px solid #e0e0e0;border-radius:10px;padding:10px 12px;background:#f9f9f9;cursor:pointer;text-align:center;transition:all .15s;user-select:none}
.loc-chip:hover{border-color:#aaa}
.loc-chip.active{border-color:#4caf50;background:#f0faf0}
.loc-chip-name{font-size:14px;font-weight:500;color:#555}
.loc-chip.active .loc-chip-name{color:#2e7d32}
.loc-chip-check{font-size:11px;color:#4caf50;margin-top:3px;min-height:15px}

/* ===== 場所詳細（エントリー複数） ===== */
.loc-detail{border:1px solid #c8e6c9;border-radius:10px;padding:10px 12px;margin-bottom:8px;background:#f9fff9}
.loc-detail-title{font-size:13px;font-weight:600;color:#2e7d32;margin-bottom:8px}
.loc-entry{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.loc-entry-note{flex:1;padding:6px 8px;border:1px solid #ccc;border-radius:6px;font-size:13px;background:#fff;color:#222;margin-bottom:0;min-width:0}
.loc-entry-note:focus{outline:none;border-color:#4caf50}
.loc-entry-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.loc-entry-num{min-width:26px;text-align:center;font-size:14px;font-weight:600}
.loc-entry-del{width:26px;height:26px;border:none;border-radius:6px;background:transparent;color:#ccc;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.loc-entry-del:hover{color:#dc2626;background:#fef2f2}
.add-entry-btn{width:100%;padding:6px;border:1px dashed #bbb;border-radius:7px;background:#fff;color:#888;cursor:pointer;font-size:12px;text-align:center;margin-top:2px}
.add-entry-btn:hover{border-color:#4caf50;color:#2e7d32}
.var-btn{width:28px;height:28px;border:1px solid #ccc;border-radius:6px;background:#f0f0f0;color:#222;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0}
.var-btn:hover{background:#e0e0e0}
.var-mic{width:26px;height:26px;border:1px solid #ccc;border-radius:6px;background:#f5f5f5;color:#888;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0}
.var-mic:hover{background:#e8f0fe;color:#1a73e8;border-color:#1a73e8}
.var-mic.rec{background:#fef2f2;color:#dc2626;border-color:#dc2626;animation:pulse 1s infinite}

/* ===== 一覧 ===== */
.item-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:0.75rem 1rem;display:flex;gap:10px;align-items:flex-start}
.thumb{width:54px;height:54px;border-radius:8px;flex-shrink:0;background:#f5f5f5;border:1px solid #e0e0e0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:22px}
.thumb img{width:54px;height:54px;object-fit:cover}
.iinfo{flex:1;min-width:0}
.iname{font-size:14px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icat{font-size:12px;color:#888;margin-bottom:5px}
.vbadges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.vbdg{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid #e0e0e0;background:#f5f5f5;color:#555}
.vbdg.tot{background:#fff3cd;color:#856404;border-color:#ffc107}
.vedit{display:flex;flex-direction:column;gap:4px}
.vedit-row{display:flex;align-items:center;gap:5px}
.vedit-lbl{font-size:11px;color:#888;min-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px}
.vicb{width:22px;height:22px;border:1px solid #ccc;border-radius:5px;background:#f0f0f0;color:#222;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0}
.vicb:hover{background:#e0e0e0}
.vicn{min-width:20px;text-align:center;font-size:12px;font-weight:500}
.chips{display:flex;gap:5px;margin-bottom:0.75rem;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.chip{padding:5px 12px;border-radius:20px;border:1px solid #ccc;background:#fff;color:#888;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip.active{background:#f0f0f0;color:#222;font-weight:500;border-color:#999}
.empty{text-align:center;color:#aaa;font-size:13px;padding:2rem 0}

/* ===== チェック ===== */
.ck-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:0.75rem 1rem;margin-bottom:0.5rem}
@media(min-width:768px){.ck-card{margin-bottom:0}}
.ck-cat{font-size:12px;font-weight:500;color:#888;margin-bottom:6px}
.ck-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0}
.ck-row:last-child{border-bottom:none}
.ck-th{width:32px;height:32px;border-radius:6px;overflow:hidden;flex-shrink:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:16px;margin-top:2px}
.ck-th img{width:32px;height:32px;object-fit:cover}
.ck-body{flex:1;min-width:0}
.ck-name{font-size:13px;font-weight:500;margin-bottom:2px}
.ck-vars{display:flex;flex-wrap:wrap;gap:4px}
.ck-vbdg{font-size:10px;padding:1px 7px;border-radius:20px;background:#f5f5f5;border:1px solid #e0e0e0;color:#555}
.ck-tot{font-size:15px;font-weight:500;flex-shrink:0;padding-left:8px;margin-top:2px}
.zero{color:#dc2626}

/* ===== 場所別 ===== */
.loc-stat-row{display:flex;gap:8px;margin-bottom:0.75rem}
.loc-stat-card{flex:1;background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:10px 12px;text-align:center}
.loc-stat-card .lsc-label{font-size:11px;color:#888;margin-bottom:3px}
.loc-stat-card .lsc-num{font-size:20px;font-weight:500}
.loc-item-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid #e0e0e0;border-radius:10px;margin-bottom:6px}
.loc-item-thumb{width:38px;height:38px;border-radius:7px;background:#f5f5f5;border:1px solid #e0e0e0;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;overflow:hidden}
.loc-item-thumb img{width:38px;height:38px;object-fit:cover}
.loc-item-info{flex:1;min-width:0}
.loc-item-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.loc-item-note{font-size:11px;color:#888;margin-top:2px}
.loc-item-count{font-size:18px;font-weight:500;flex-shrink:0}
.loc-section-title{font-size:11px;color:#aaa;font-weight:500;margin:12px 0 5px;letter-spacing:.05em}
.loc-item-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.loc-item-head{display:flex;align-items:center;gap:10px}
.loc-item-vars{border-top:1px solid #f0f0f0;padding-top:8px;margin-top:10px;display:flex;flex-direction:column;gap:5px}
.loc-var-row{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.loc-var-note{color:#888}
.loc-var-count{font-weight:500}
</style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<div class="app-shell">
  <div class="app-header">
    🍬 だがし在庫管理
    <span id="syncBadge" class="sync-badge">接続中...</span>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="sw('add')">＋ 登録</div>
    <div class="tab" onclick="sw('list')">一覧</div>
    <div class="tab" onclick="sw('loc')">場所別</div>
    <div class="tab" onclick="sw('check')">チェック</div>
  </div>
  <div class="main-body">
    <div class="sidebar">
      <div class="tab active" onclick="sw('add')">＋ 登録</div>
      <div class="tab" onclick="sw('list')">📦 一覧</div>
      <div class="tab" onclick="sw('loc')">📍 場所別</div>
      <div class="tab" onclick="sw('check')">✅ チェック</div>
    </div>
    <div class="content-area">

      <!-- 登録タブ -->
      <div id="tab-add" class="section active">
        <div class="form-grid">
          <div class="form-col">
            <div class="card">
              <div class="lbl">写真</div>
              <div class="img-upload">
                <input type="file" accept="image/*" capture="environment" id="ii" onchange="prevImg(this)">
                <span id="ip">📷 タップして撮影 / 選択</span>
                <img id="iv" style="display:none">
              </div>
            </div>
            <div class="card">
              <div class="lbl">商品名</div>
              <div class="mic-btn" id="mb" onclick="mic()">🎤 <span id="ml">音声で入力</span></div>
              <input type="text" id="nm" placeholder="または手入力">
              <div class="lbl">カテゴリ</div>
              <select id="ct">
                <option>おめん</option><option>おもちゃ</option><option>シュシュ</option>
                <option>花火</option><option>かざ車</option><option>おとこのこぶき</option>
                <option>おんなのこぶき</option><option>クリスマス</option>
                <option>お正月</option><option>ハロウィン</option><option>その他</option>
              </select>
            </div>
          </div>
          <div class="form-col">
            <div class="card">
              <div class="lbl">場所を選択</div>
              <div class="loc-grid" id="locList"></div>
              <div id="locDetails"></div>
            </div>
          </div>
        </div>
        <button class="save-btn" id="saveBtn" onclick="save()">保存する</button>
        <button class="cancel-btn" id="cancelEditBtn" onclick="resetForm()" style="display:none">✕ キャンセル</button>
      </div>

      <!-- 一覧タブ -->
      <div id="tab-list" class="section">
        <div class="chips">
          <div class="chip active" onclick="filt('all',this)">すべて</div>
          <div class="chip" onclick="filt('おめん',this)">おめん</div>
          <div class="chip" onclick="filt('おもちゃ',this)">おもちゃ</div>
          <div class="chip" onclick="filt('シュシュ',this)">シュシュ</div>
          <div class="chip" onclick="filt('花火',this)">花火</div>
          <div class="chip" onclick="filt('かざ車',this)">かざ車</div>
          <div class="chip" onclick="filt('おとこのこぶき',this)">おとこぶき</div>
          <div class="chip" onclick="filt('おんなのこぶき',this)">おんなぶき</div>
          <div class="chip" onclick="filt('クリスマス',this)">クリスマス</div>
          <div class="chip" onclick="filt('お正月',this)">お正月</div>
          <div class="chip" onclick="filt('ハロウィン',this)">ハロウィン</div>
          <div class="chip" onclick="filt('その他',this)">その他</div>
        </div>
        <div id="il"></div>
      </div>

      <!-- 場所別タブ -->
      <div id="tab-loc" class="section">
        <div class="chips" id="locTabChips"></div>
        <div class="loc-stat-row" id="locStatRow"></div>
        <div id="locItemList"></div>
      </div>

      <!-- チェックタブ -->
      <div id="tab-check" class="section">
        <div class="ck-card" style="margin-bottom:0.75rem">
          <p style="font-size:13px;color:#888">イベント前チェックリスト — 場所別在庫</p>
        </div>
        <div id="cl"></div>
      </div>

    </div>
  </div>
</div>

<!-- 場所移動シート -->
<div class="move-overlay" id="moveOverlay" style="display:none">
  <div class="move-sheet">
    <div class="move-sheet-title" id="moveTitle">場所を移動</div>
    <div class="move-sheet-sub" id="moveSub">移動先を選んでください</div>
    <div class="move-loc-grid" id="moveChips"></div>
    <div class="move-qty-section" id="moveQtySection">
      <div class="move-qty-label">何個移動しますか？</div>
      <div class="move-qty-row">
        <div class="vicb" onclick="changeMoveQty(-1)">−</div>
        <div class="move-qty-num" id="moveQtyNum">1</div>
        <div class="vicb" onclick="changeMoveQty(1)">＋</div>
        <span style="font-size:13px;color:#888">個</span>
      </div>
      <div class="move-qty-max" id="moveQtyMax"></div>
    </div>
    <button class="move-confirm-btn" id="moveConfirmBtn" disabled onclick="doMove()">移動する</button>
    <button class="move-cancel-btn" onclick="closeMoveSheet()">キャンセル</button>
  </div>
</div>
<div class="move-toast" id="moveToast"></div>
<div class="del-var-toast" id="delVarToast">
  <span id="delVarMsg">削除しますか？</span>
  <button class="del-var-ok" onclick="doDeleteVar()">削除</button>
  <button class="del-var-cancel" onclick="cancelDeleteVar()">キャンセル</button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA2ySQxuXoL3Vg-Fn8HKA_oyd1BHmqo03I",
  authDomain: "dagashi-inventory.firebaseapp.com",
  projectId: "dagashi-inventory",
  storageBucket: "dagashi-inventory.firebasestorage.app",
  messagingSenderId: "1038759847620",

// ===== 写真 =====
function prevImg(i) {
  if(!i.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const imgEl = new Image();
    imgEl.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 400;
      let w = imgEl.width, h = imgEl.height;
      if(w > h && w > MAX){ h = Math.round(h*MAX/w); w = MAX; }
      else if(h > MAX){ w = Math.round(w*MAX/h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(imgEl, 0, 0, w, h);
      img = canvas.toDataURL('image/jpeg', 0.65);
      const iv = document.getElementById('iv');
      iv.src = img; iv.style.display = 'block';
      document.getElementById('ip').style.display = 'none';
    };
    imgEl.src = e.target.result;
  };
  reader.readAsDataURL(i.files[0]);
}

// ===== 商品名音声 =====
function mic() {
  const b = document.getElementById('mb'), l = document.getElementById('ml');
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
    alert('このブラウザは音声入力に対応していません'); return;
  }
  if(rec){ rec.stop(); rec=null; b.classList.remove('rec'); l.textContent='音声で入力'; return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  rec = new SR(); rec.lang = 'ja-JP';
  rec.onresult = e => { document.getElementById('nm').value = e.results[0][0].transcript; };
  rec.onend = () => { rec=null; b.classList.remove('rec'); l.textContent='音声で入力'; };
  rec.start(); b.classList.add('rec'); l.textContent = '聞いてるよ...';
}

// ===== 場所 UI =====
function initLocs(preset) {
  LOC_NAMES.forEach(n => {
    const p = preset && preset[n];
    locData[n] = {
      selected: p ? !!p.selected : false,
      entries:  p && p.entries && p.entries.length ? p.entries.map(e => ({note: e.note||'', count: e.count||0})) : [{note:'', count:0}]
    };
  });
  renderLocs();
}

function renderLocs() {
  // チップ
  document.getElementById('locList').innerHTML = LOC_NAMES.map(loc => `
    <div class="loc-chip${locData[loc].selected?' active':''}" onclick="toggleLoc('${loc}')">
      <div class="loc-chip-name">${loc}</div>
      <div class="loc-chip-check">${locData[loc].selected ? '✓ 選択中' : ''}</div>
    </div>`).join('');

  // 選択済みの詳細
  const selected = LOC_NAMES.filter(l => locData[l].selected);
  document.getElementById('locDetails').innerHTML = selected.map(loc => {
    const entries = locData[loc].entries;
    const rows = entries.map((e, i) => `
      <div class="loc-entry">
        <button class="var-mic" id="lnm-${loc}-${i}" onclick="micEntryNote('${loc}',${i})" title="音声で備考">🎤</button>
        <input class="loc-entry-note" type="text" placeholder="備考"
          value="${e.note.replace(/"/g,'&quot;')}"
          oninput="locData['${loc}'].entries[${i}].note=this.value">
        <div class="loc-entry-ctrl">
          <button class="var-mic" id="lcm-${loc}-${i}" onclick="micEntryCount('${loc}',${i})" title="音声で個数">🎤</button>
          <div class="var-btn" onclick="entryCount('${loc}',${i},-1)">−</div>
          <div class="loc-entry-num" id="len-${loc}-${i}">${e.count}</div>
          <div class="var-btn" onclick="entryCount('${loc}',${i},1)">＋</div>
        </div>
        ${entries.length > 1 ? `<button class="loc-entry-del" onclick="delEntry('${loc}',${i})">✕</button>` : '<div style="width:26px"></div>'}
      </div>`).join('');
    return `
    <div class="loc-detail">
      <div class="loc-detail-title">📍 ${loc}</div>
      ${rows}
      <div class="add-entry-btn" onclick="addEntry('${loc}')">＋ 備考・個数を追加</div>
    </div>`;
  }).join('');
}

function toggleLoc(loc) {
  locData[loc].selected = !locData[loc].selected;
  renderLocs();
}

function addEntry(loc) {
  locData[loc].entries.push({note:'', count:0});
  renderLocs();
}

function delEntry(loc, i) {
  locData[loc].entries.splice(i, 1);
  if(!locData[loc].entries.length) locData[loc].entries = [{note:'', count:0}];
  renderLocs();
}

function entryCount(loc, i, d) {
  locData[loc].entries[i].count = Math.max(0, (locData[loc].entries[i].count||0) + d);
  const el = document.getElementById('len-'+loc+'-'+i);
  if(el) el.textContent = locData[loc].entries[i].count;
}

// ===== 音声：備考 =====
let entryNoteRec = null;
function micEntryNote(loc, i) {
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
    alert('このブラウザは音声入力に対応していません'); return;
  }
  if(entryNoteRec){ entryNoteRec.stop(); entryNoteRec = null; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  entryNoteRec = new SR(); entryNoteRec.lang = 'ja-JP';
  const btn = document.getElementById('lnm-'+loc+'-'+i);
  if(btn) btn.classList.add('rec');
  entryNoteRec.onresult = e => {
    const txt = e.results[0][0].transcript.trim();
    locData[loc].entries[i].note = txt;
    const inp = document.querySelector(`input[oninput*="'${loc}'].entries[${i}]"]`);
    if(inp) inp.value = txt;
    else renderLocs();
  };
  entryNoteRec.onend = () => {
    entryNoteRec = null;
    if(btn) btn.classList.remove('rec');
  };
  entryNoteRec.start();
}

// ===== 音声：個数 =====
let entryCountRec = null;
function micEntryCount(loc, i) {
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
    alert('このブラウザは音声入力に対応していません'); return;
  }
  if(entryCountRec){ entryCountRec.stop(); entryCountRec = null; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  entryCountRec = new SR(); entryCountRec.lang = 'ja-JP';
  const btn = document.getElementById('lcm-'+loc+'-'+i);
  if(btn) btn.classList.add('rec');
  entryCountRec.onresult = e => {
    const txt = e.results[0][0].transcript.trim();
    const kanji = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'十一':11,'十二':12,'十三':13,'十四':14,'十五':15,'十六':16,'十七':17,'十八':18,'十九':19,'二十':20};
    let normalized = txt;
    Object.keys(kanji).sort((a,b)=>b.length-a.length).forEach(k => {
      normalized = normalized.replace(new RegExp(k,'g'), kanji[k]);
    });
    const m = normalized.match(/(\d+)/);
    if(m) {
      locData[loc].entries[i].count = parseInt(m[1]);
      const el = document.getElementById('len-'+loc+'-'+i);
      if(el) el.textContent = locData[loc].entries[i].count;
    }
  };
  entryCountRec.onend = () => {
    entryCountRec = null;
    if(btn) btn.classList.remove('rec');
  };
  entryCountRec.start();
}

initLocs();

// ===== 保存 / 更新 =====
async function save() {
  const n = document.getElementById('nm').value.trim();
  if(!n){ alert('商品名を入力してください'); return; }
  // 選択済み場所のエントリーをフラットに展開
  const vars = [];
  LOC_NAMES.filter(l => locData[l].selected).forEach(loc => {
    locData[loc].entries.forEach(e => {
      if(e.note.trim() || e.count > 0) {
        vars.push({ loc: loc, note: e.note.trim(), count: e.count });
      }
    });
    // エントリーが全て空でも場所だけ記録
    if(!vars.find(v => v.loc === loc)) {
      vars.push({ loc: loc, note: '', count: 0 });
    }
  });
  const btn = document.getElementById('saveBtn');
  const isEdit = !!editingId;
  btn.disabled = true; btn.textContent = isEdit ? '更新中...' : '保存中...';
  try {
    const data = { name: n, cat: document.getElementById('ct').value, variants: vars };
    if(img) data.img = img;
    if(isEdit) {
      await col.doc(editingId).update(data);
      alert(n + ' を更新したおいっす！');
    } else {
      data.img = img || null;
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      await col.add(data);
      alert(n + ' を保存したおいっす！');
    }
    resetForm();
  } catch(e) {
    alert('失敗したおいっす: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = editingId ? '更新する' : '保存する';
  }
}

function resetForm() {
  editingId = null;
  document.getElementById('nm').value = '';
  const iv = document.getElementById('iv');
  iv.style.display = 'none'; iv.src = '';
  document.getElementById('ip').style.display = '';
  document.getElementById('ii').value = '';
  img = null;
  initLocs();
  document.getElementById('saveBtn').textContent = '保存する';
  const cb = document.getElementById('cancelEditBtn');
  if(cb) cb.style.display = 'none';
}

function editItem(id) {
  const it = items.find(i => i.id === id);
  if(!it) return;
  editingId = id;
  document.getElementById('nm').value = it.name || '';
  const ct = document.getElementById('ct');
  if(it.cat) ct.value = it.cat;
  img = it.img || null;
  const iv = document.getElementById('iv');
  if(it.img){ iv.src = it.img; iv.style.display = 'block'; document.getElementById('ip').style.display = 'none'; }
  else { iv.style.display = 'none'; document.getElementById('ip').style.display = ''; }
  // 保存データ → locData に復元
  const preset = {};
  const allVars = getVars(it);
  allVars.forEach(v => {
    const loc = v.loc || (LOC_NAMES.includes(v.name) ? v.name : null);
    if(loc) {
      if(!preset[loc]) preset[loc] = { selected: true, entries: [] };
      preset[loc].entries.push({ note: v.note || v.name || '', count: v.count || 0 });
    }
  });
  initLocs(preset);
  document.getElementById('saveBtn').textContent = '更新する';
  const cb = document.getElementById('cancelEditBtn');
  if(cb) cb.style.display = 'block';
  sw('add');
  window.scrollTo(0, 0);
}

// ===== 一覧 =====
function filt(f, el) {
  cf = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active'); rl();
}

function getVars(it) {
  if(it.variants && it.variants.length) return it.variants;
  // 旧形式互換
  const old = [];
  const LOCS = {sh:'渋谷', shin:'新町御池', dema:'出町柳', maru:'円町'};
  Object.keys(LOCS).forEach(k => { if(it[k]) old.push({loc: LOCS[k], note:'', count: it[k]}); });
  return old;
}

function getTotal(it) {
  return getVars(it).reduce((s, v) => s + (v.count||0), 0);
}

function getLabel(v) {
  // loc + note 表示用
  if(v.loc && v.note) return v.loc + ' · ' + v.note;
  if(v.loc) return v.loc;
  if(v.name) return v.name; // 旧形式
  return '';
}

function rl() {
  const el = document.getElementById('il');
  const fl = cf==='all' ? items : items.filter(i => i.cat===cf);
  if(!fl.length){ el.innerHTML = '<div class="empty">まだ登録がないおいっす</div>'; return; }
  el.innerHTML = fl.map(it => {
    const vars = getVars(it);
    const tot = getTotal(it);
    const badges = vars.map(v =>
      `<span class="vbdg">${getLabel(v)} <b>${v.count||0}</b></span>`
    ).join('') + `<span class="vbdg tot">計 <b id="vbt-${it.id}">${tot}</b></span>`;
    const editRows = vars.map((v, vi) => {
      const cnt = v.count||0;
      const isZero = cnt === 0;
      return `
      <div class="vedit-row" id="vrow-${it.id}-${vi}">
        <span class="vedit-lbl">${getLabel(v)}</span>
        <div class="vicb" onclick="uv('${it.id}',${vi},-1)">−</div>
        <div class="vicn${isZero?' zero':''}" id="vn-${it.id}-${vi}">${cnt}</div>
        <div class="vicb" onclick="uv('${it.id}',${vi},1)">＋</div>
        <button class="move-btn" onclick="openMoveSheet('${it.id}',${vi})">移動</button>
        ${isZero ? `<button class="del-var-btn" onclick="askDeleteVar('${it.id}',${vi},'${getLabel(v).replace(/'/g,"\\'")}')">削除</button>` : ''}
      </div>`;
    }).join('');
    return `<div class="item-card">
      <div class="thumb">${it.img ? `<img src="${it.img}" alt="${it.name}">` : '📦'}</div>
      <div class="iinfo">
        <div class="iname">${it.name}</div>
        <div class="icat">${it.cat}</div>
        <div class="vbadges">${badges}</div>
        <div class="vedit">${editRows}</div>
        <div class="item-actions">
          <button class="edit-btn" onclick="editItem('${it.id}')">✏️ 編集</button>
          <button class="del-btn" onclick="deleteItem('${it.id}')">🗑️ 削除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== 削除 =====
async function deleteItem(id) {
  const it = items.find(i => i.id === id);
  const name = it ? it.name : 'この商品';
  if(!confirm(name + ' を削除しますか？')) return;
  try { await col.doc(id).delete(); }
  catch(e){ alert('削除に失敗したおいっす: ' + e.message); }
}

// ===== 一覧：個数更新 =====
async function uv(id, vi, d) {
  const it = items.find(i => i.id===id); if(!it) return;
  const vars = it.variants ? [...it.variants] : getVars(it).map(v => ({...v}));
  if(!vars[vi]) return;
  vars[vi].count = Math.max(0, (vars[vi].count||0) + d);
  it.variants = vars;
  const numEl = document.getElementById('vn-'+id+'-'+vi);
  if(numEl) numEl.textContent = vars[vi].count;
  const tot = vars.reduce((s,v) => s+(v.count||0), 0);
  const totEl = document.getElementById('vbt-'+id);
  if(totEl) totEl.textContent = tot;
  try { await col.doc(id).update({variants: vars}); }
  catch(e){ console.error(e); }
}

// ===== 場所移動 =====
let moveState = {itemId: null, vi: null, destLoc: null, moveQty: 1, currentCount: 0};

function openMoveSheet(id, vi) {
  const it = items.find(i => i.id === id);
  if(!it) return;
  const vars = it.variants ? [...it.variants] : getVars(it).map(v=>({...v}));
  const v = vars[vi];
  if(!v) return;
  const currentCount = v.count || 0;
  moveState = {itemId: id, vi, destLoc: null, moveQty: 1, currentCount};
  const currentLoc = v.loc || v.name || '';
  const label = v.note ? v.note : currentLoc;
  document.getElementById('moveTitle').textContent = '「' + label + '」を移動';
  document.getElementById('moveSub').textContent = currentLoc + ' → どこへ移動しますか？';
  document.getElementById('moveConfirmBtn').disabled = true;
  document.getElementById('moveQtySection').style.display = 'none';
  document.getElementById('moveQtyNum').textContent = '1';
  document.getElementById('moveChips').innerHTML = LOC_NAMES.map(loc => {
    const isCurrent = loc === currentLoc;
    return `<div class="move-chip${isCurrent?' disabled':''}" id="mchip-${loc}" onclick="selectMoveDest('${loc}')">
      <div class="move-chip-name">${loc}</div>
      <div class="move-chip-check" id="mcheck-${loc}">${isCurrent ? '現在の場所' : ''}</div>
    </div>`;
  }).join('');
  document.getElementById('moveOverlay').style.display = 'flex';
}

function selectMoveDest(loc) {
  document.querySelectorAll('.move-chip').forEach(c => c.classList.remove('selected'));
  document.querySelectorAll('.move-chip-check').forEach(c => { if(!c.textContent.includes('現在')) c.textContent = ''; });
  const chip = document.getElementById('mchip-'+loc);
  if(chip && !chip.classList.contains('disabled')) {
    chip.classList.add('selected');
    document.getElementById('mcheck-'+loc).textContent = '✓ 移動先';
    moveState.destLoc = loc;
    moveState.moveQty = 1;
    document.getElementById('moveQtyNum').textContent = '1';
    document.getElementById('moveQtyMax').textContent = '在庫：' + moveState.currentCount + '個（最大）';
    document.getElementById('moveQtySection').style.display = 'block';
    document.getElementById('moveConfirmBtn').disabled = false;
  }
}

function changeMoveQty(d) {
  moveState.moveQty = Math.min(moveState.currentCount, Math.max(1, moveState.moveQty + d));
  document.getElementById('moveQtyNum').textContent = moveState.moveQty;
}

async function doMove() {
  const {itemId, vi, destLoc, moveQty} = moveState;
  if(!itemId || vi === null || !destLoc) return;
  const it = items.find(i => i.id === itemId);
  if(!it) return;
  const vars = it.variants ? it.variants.map(v=>({...v})) : getVars(it).map(v=>({...v}));
  if(!vars[vi]) return;
  const fromLoc = vars[vi].loc || vars[vi].name || '';
  const srcNote = vars[vi].note || '';

  // ソースの個数を減らす
  vars[vi].count = Math.max(0, (vars[vi].count||0) - moveQty);

  // 移動先に同じ備考のエントリーがあれば加算、なければ新規追加
  const existIdx = vars.findIndex((v, idx) => idx !== vi && (v.loc || v.name) === destLoc && (v.note||'') === srcNote);
  if(existIdx >= 0) {
    vars[existIdx].count = (vars[existIdx].count||0) + moveQty;
  } else {
    vars.push({loc: destLoc, note: srcNote, count: moveQty});
  }

  closeMoveSheet();
  try {
    await col.doc(itemId).update({variants: vars});
    showMoveToast(fromLoc + ' → ' + destLoc + ' に ' + moveQty + '個 移動したおいっす！');
  } catch(e) {
    alert('移動に失敗したおいっす: ' + e.message);
  }
}

function closeMoveSheet() {
  document.getElementById('moveOverlay').style.display = 'none';
  moveState = {itemId: null, vi: null, destLoc: null};
}

function showMoveToast(msg) {
  const t = document.getElementById('moveToast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== バリアント削除 =====
let delVarState = {itemId: null, vi: null};

function askDeleteVar(id, vi, label) {
  delVarState = {itemId: id, vi};
  document.getElementById('delVarMsg').textContent = '「' + label + '」を削除しますか？';
  document.getElementById('delVarToast').classList.add('show');
}

function cancelDeleteVar() {
  document.getElementById('delVarToast').classList.remove('show');
  delVarState = {itemId: null, vi: null};
}

async function doDeleteVar() {
  const {itemId, vi} = delVarState;
  cancelDeleteVar();
  if(!itemId || vi === null) return;
  const it = items.find(i => i.id === itemId);
  if(!it) return;
  const vars = it.variants ? it.variants.map(v=>({...v})) : getVars(it).map(v=>({...v}));
  vars.splice(vi, 1);
  try {
    await col.doc(itemId).update({variants: vars});
    showMoveToast('削除したおいっす！');
  } catch(e) {
    alert('削除に失敗したおいっす: ' + e.message);
  }
}

// ===== 場所別ビュー =====
let curLocTab = LOC_NAMES[0];

function rloc() {
  document.getElementById('locTabChips').innerHTML = LOC_NAMES.map(l =>
    `<div class="chip${l===curLocTab?' active':''}" onclick="setLocTab('${l}')">${l}</div>`
  ).join('');

  // この場所のアイテムを商品ごとにグループ化
  const locItems = [];
  items.forEach(it => {
    const vars = getVars(it).filter(v => (v.loc||v.name) === curLocTab);
    if(!vars.length) return;
    const tot = vars.reduce((s,v) => s+(v.count||0), 0);
    locItems.push({it, vars, tot});
  });

  // サマリー
  const total = locItems.reduce((s,r) => s + r.tot, 0);
  const zeroCount = locItems.filter(r => r.tot === 0).length;
  document.getElementById('locStatRow').innerHTML = `
    <div class="loc-stat-card"><div class="lsc-label">総在庫数</div><div class="lsc-num">${total}</div></div>
    <div class="loc-stat-card"><div class="lsc-label">商品種類</div><div class="lsc-num">${locItems.length}</div></div>
    <div class="loc-stat-card"><div class="lsc-label">在庫ゼロ</div><div class="lsc-num${zeroCount>0?' zero':''}">${zeroCount}</div></div>
  `;

  if(!locItems.length){
    document.getElementById('locItemList').innerHTML = '<div class="empty">この場所の在庫はないおいっす</div>';
    return;
  }

  const okItems = locItems.filter(r => r.tot > 0);
  const zeroItems = locItems.filter(r => r.tot === 0);
  let html = okItems.map(r => locItemCardHTML(r)).join('');
  if(zeroItems.length) {
    html += `<div class="loc-section-title">在庫ゼロ</div>`;
    html += zeroItems.map(r => locItemCardHTML(r, true)).join('');
  }
  document.getElementById('locItemList').innerHTML = html;
}

function locItemCardHTML({it, vars, tot}, faded) {
  const thumb = it.img ? `<img src="${it.img}" alt="">` : '📦';
  const varRows = vars.map(v => {
    const cnt = v.count||0;
    const note = v.note || '（備考なし）';
    return `<div class="loc-var-row">
      <span class="loc-var-note">${note}</span>
      <span class="loc-var-count${cnt===0?' zero':''}">${cnt}</span>
    </div>`;
  }).join('');
  return `<div class="loc-item-card"${faded?' style="opacity:.45"':''}>
    <div class="loc-item-head">
      <div class="loc-item-thumb">${thumb}</div>
      <div class="loc-item-info">
        <div class="loc-item-name">${it.name}</div>
        <div class="loc-item-note">${it.cat}</div>
      </div>
      <div class="loc-item-count${tot===0?' zero':''}">計 ${tot}</div>
    </div>
    <div class="loc-item-vars">${varRows}</div>
  </div>`;
}

function setLocTab(loc) { curLocTab = loc; rloc(); }

// ===== チェックリスト =====
function rc() {
  const el = document.getElementById('cl');
  if(!items.length){ el.innerHTML = '<div class="empty">在庫がまだ登録されていないおいっす</div>'; return; }
  const cats = [...new Set(items.map(i => i.cat))];
  el.innerHTML = cats.map(cat => {
    const rows = items.filter(i => i.cat===cat).map(it => {
      const vars = getVars(it);
      const tot = getTotal(it);
      const varBadges = vars.map(v =>
        `<span class="ck-vbdg">${getLabel(v)} ${v.count||0}</span>`
      ).join('');
      return `<div class="ck-row">
        <div class="ck-th">${it.img ? `<img src="${it.img}">` : '📦'}</div>
        <div class="ck-body">
          <div class="ck-name">${it.name}</div>
          <div class="ck-vars">${varBadges || '<span style="font-size:10px;color:#ccc">場所未設定</span>'}</div>
        </div>
        <div class="ck-tot${tot===0?' zero':''}">${tot}</div>
      </div>`;
    }).join('');
    return `<div class="ck-card"><div class="ck-cat">${cat}</div>${rows}</div>`;
  }).join('');
}
