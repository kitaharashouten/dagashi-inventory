<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>だがし在庫管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#222;min-height:100vh}

/* ===== モバイル ===== */
.app-shell{max-width:480px;margin:0 auto;padding:0.75rem;min-height:100vh}
.app-header{font-size:18px;font-weight:500;margin-bottom:1rem;display:flex;align-items:center;gap:8px}
.sync-badge{font-size:11px;padding:2px 8px;border-radius:20px;background:#fef9e8;color:#b45309;border:1px solid #b45309;margin-left:auto}
.sync-badge.ok{background:#e8fef0;color:#057a55;border-color:#057a55}
.sync-badge.err{background:#fef2f2;color:#dc2626;border-color:#dc2626}
.tab-bar{display:flex;gap:6px;margin-bottom:1rem}
.sidebar{display:none}
.tab{flex:1;padding:8px 4px;font-size:13px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#888;cursor:pointer;text-align:center;transition:all .15s}
.tab.active{background:#eee;color:#222;font-weight:500;border-color:#999}
.section{display:none}.section.active{display:block}

/* ===== PC ===== */
@media(min-width:768px){
  body{display:flex;flex-direction:column}
  .app-shell{max-width:100%;padding:0;display:flex;flex-direction:column;height:100vh}
  .app-header{padding:1rem 1.5rem;font-size:20px;border-bottom:1px solid #e0e0e0;background:#fff;margin-bottom:0;flex-shrink:0}
  .main-body{display:flex;flex:1;overflow:hidden}
  .sidebar{width:160px;flex-shrink:0;background:#fff;border-right:1px solid #e0e0e0;padding:1rem 0.75rem;display:flex;flex-direction:column;gap:6px}
  .tab-bar{display:none}
  .sidebar .tab{flex:none;width:100%;padding:10px 12px;font-size:14px;border-radius:8px;text-align:left}
  .content-area{flex:1;overflow-y:auto;padding:1.5rem;background:#f5f5f0}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
  .form-col{display:flex;flex-direction:column;gap:0}
  #il{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:0.75rem}
  #cl{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:0.75rem}
  .content-area::-webkit-scrollbar{width:6px}
  .content-area::-webkit-scrollbar-track{background:transparent}
  .content-area::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
}

/* ===== カード ===== */
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1rem 1.25rem;margin-bottom:0.75rem}
@media(min-width:768px){.card{margin-bottom:0}}
.lbl{font-size:12px;color:#888;margin-bottom:4px}
.img-upload{border:1px dashed #bbb;border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;color:#888;font-size:13px;position:relative;overflow:hidden}
.img-upload input{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload img{max-width:100%;max-height:120px;object-fit:contain;border-radius:8px}
input[type=text],select{width:100%;margin-bottom:0.75rem;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:14px;background:#fff;color:#222}
input[type=text]:focus,select:focus{outline:none;border-color:#888}
.mic-btn{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;background:#f5f5f5;color:#888;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:0.75rem}
.mic-btn.rec{background:#fef2f2;color:#dc2626;border-color:#dc2626;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.save-btn{width:100%;padding:12px;border-radius:8px;background:#222;border:none;color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-top:0.5rem}
.save-btn:hover{background:#444}
.save-btn:disabled{background:#aaa;cursor:not-allowed}
.cancel-btn{width:100%;padding:10px;border-radius:8px;background:#fff;border:1px solid #ccc;color:#888;font-size:14px;cursor:pointer;margin-top:0.5rem}
.cancel-btn:hover{background:#f5f5f5;color:#444}
@media(min-width:768px){.save-btn,.cancel-btn{max-width:320px}}
.item-actions{display:flex;gap:6px;margin-top:8px}
.edit-btn{padding:5px 12px;border-radius:6px;border:1px solid #ccc;background:#f5f5f5;color:#555;font-size:12px;cursor:pointer}
.edit-btn:hover{background:#e8f0fe;color:#1a73e8;border-color:#1a73e8}
.del-btn{padding:5px 12px;border-radius:6px;border:1px solid #fcc;background:#fff5f5;color:#dc2626;font-size:12px;cursor:pointer}
.del-btn:hover{background:#fef2f2;border-color:#dc2626}

/* ===== 場所選択 ===== */
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.loc-chip{border:2px solid #e0e0e0;border-radius:10px;padding:8px 10px;background:#f9f9f9;transition:all .15s}
.loc-chip.active{border-color:#4caf50;background:#f0faf0}
.loc-chip-name{font-size:13px;font-weight:500;color:#555;margin-bottom:6px;text-align:center}
.loc-chip.active .loc-chip-name{color:#2e7d32}
.loc-ctrl{display:flex;align-items:center;justify-content:center;gap:6px}
.loc-num{min-width:24px;text-align:center;font-size:15px;font-weight:600}

/* ===== バリエーション入力 ===== */
.var-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.var-row{display:flex;align-items:center;gap:6px}
.var-name{flex:1;margin-bottom:0!important;font-size:13px}
.var-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.var-btn{width:30px;height:30px;border:1px solid #ccc;border-radius:6px;background:#f0f0f0;color:#222;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0}
.var-btn:hover{background:#e0e0e0}
.var-num{min-width:24px;text-align:center;font-size:14px;font-weight:500}
.var-del{width:28px;height:28px;border:none;border-radius:6px;background:transparent;color:#ccc;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.var-del:hover{color:#dc2626;background:#fef2f2}
.var-mic{width:28px;height:28px;border:1px solid #ccc;border-radius:6px;background:#f5f5f5;color:#888;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.var-mic:hover{background:#e8f0fe;color:#1a73e8;border-color:#1a73e8}
.var-mic.rec{background:#fef2f2;color:#dc2626;border-color:#dc2626;animation:pulse 1s infinite}
.add-var-btn{width:100%;padding:8px;border:1px dashed #bbb;border-radius:8px;background:#fff;color:#888;cursor:pointer;font-size:13px;text-align:center;margin-bottom:0.75rem}
.add-var-btn:hover{border-color:#888;color:#444}

/* ===== 一覧 ===== */
.item-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:0.75rem 1rem;display:flex;gap:10px;align-items:flex-start}
.thumb{width:54px;height:54px;border-radius:8px;flex-shrink:0;background:#f5f5f5;border:1px solid #e0e0e0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:22px}
.thumb img{width:54px;height:54px;object-fit:cover}
.iinfo{flex:1;min-width:0}
.iname{font-size:14px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.icat{font-size:12px;color:#888;margin-bottom:5px}
.vbadges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.vbdg{font-size:11px;padding:2px 8px;border-radius:20px;border:1px solid #e0e0e0;background:#f5f5f5;color:#555}
.vbdg.tot{background:#fff3cd;color:#856404;border-color:#ffc107}
.vedit{display:flex;flex-direction:column;gap:4px}
.vedit-row{display:flex;align-items:center;gap:5px}
.vedit-lbl{font-size:11px;color:#888;min-width:32px}
.vicb{width:22px;height:22px;border:1px solid #ccc;border-radius:5px;background:#f0f0f0;color:#222;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;flex-shrink:0}
.vicb:hover{background:#e0e0e0}
.vicn{min-width:20px;text-align:center;font-size:12px;font-weight:500}
.chips{display:flex;gap:5px;margin-bottom:0.75rem;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.chip{padding:5px 12px;border-radius:20px;border:1px solid #ccc;background:#fff;color:#888;font-size:11px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chip.active{background:#f0f0f0;color:#222;font-weight:500;border-color:#999}
.empty{text-align:center;color:#aaa;font-size:13px;padding:2rem 0}

/* ===== チェック ===== */
.ck-card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:0.75rem 1rem;margin-bottom:0.5rem}
@media(min-width:768px){.ck-card{margin-bottom:0}}
.ck-cat{font-size:12px;font-weight:500;color:#888;margin-bottom:6px}
.ck-row{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0}
.ck-row:last-child{border-bottom:none}
.ck-th{width:32px;height:32px;border-radius:6px;overflow:hidden;flex-shrink:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:16px;margin-top:2px}
.ck-th img{width:32px;height:32px;object-fit:cover}
.ck-body{flex:1;min-width:0}
.ck-name{font-size:13px;font-weight:500;margin-bottom:2px}
.ck-vars{display:flex;flex-wrap:wrap;gap:4px}
.ck-vbdg{font-size:10px;padding:1px 7px;border-radius:20px;background:#f5f5f5;border:1px solid #e0e0e0;color:#555}
.ck-tot{font-size:15px;font-weight:500;flex-shrink:0;padding-left:8px;margin-top:2px}
.zero{color:#dc2626}
</style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<div class="app-shell">
  <div class="app-header">
    🍬 だがし在庫管理
    <span id="syncBadge" class="sync-badge">接続中...</span>
  </div>
  <div class="tab-bar">
    <div class="tab active" onclick="sw('add')">＋ 登録</div>
    <div class="tab" onclick="sw('list')">一覧</div>
    <div class="tab" onclick="sw('check')">チェック</div>
  </div>
  <div class="main-body">
    <div class="sidebar">
      <div class="tab active" onclick="sw('add')">＋ 登録</div>
      <div class="tab" onclick="sw('list')">📦 一覧</div>
      <div class="tab" onclick="sw('check')">✅ チェック</div>
    </div>
    <div class="content-area">

      <!-- 登録タブ -->
      <div id="tab-add" class="section active">
        <div class="form-grid">
          <div class="form-col">
            <div class="card">
              <div class="lbl">写真</div>
              <div class="img-upload">
                <input type="file" accept="image/*" capture="environment" id="ii" onchange="prevImg(this)">
                <span id="ip">📷 タップして撮影 / 選択</span>
                <img id="iv" style="display:none">
              </div>
            </div>
            <div class="card">
              <div class="lbl">商品名</div>
              <div class="mic-btn" id="mb" onclick="mic()">🎤 <span id="ml">音声で入力</span></div>
              <input type="text" id="nm" placeholder="または手入力">
              <div class="lbl">カテゴリ</div>
              <select id="ct">
                <option>おめん</option><option>おもちゃ</option><option>シュシュ</option>
                <option>花火</option><option>かざ車</option><option>おとこのこぶき</option>
                <option>おんなのこぶき</option><option>その他</option>
              </select>
            </div>
          </div>
          <div class="form-col">
            <div class="card">
              <div class="lbl">場所</div>
              <div class="loc-grid" id="locList"></div>
            </div>
            <div class="card">
              <div class="lbl">バリエーション（色・種類など）</div>
              <div class="var-list" id="varList"></div>
              <div class="add-var-btn" onclick="addVar()">＋ バリエーション追加</div>
            </div>
          </div>
        </div>
        <button class="save-btn" id="saveBtn" onclick="save()">保存する</button>
        <button class="cancel-btn" id="cancelEditBtn" onclick="resetForm()" style="display:none">✕ キャンセル</button>
      </div>

      <!-- 一覧タブ -->
      <div id="tab-list" class="section">
        <div class="chips">
          <div class="chip active" onclick="filt('all',this)">すべて</div>
          <div class="chip" onclick="filt('おめん',this)">おめん</div>
          <div class="chip" onclick="filt('おもちゃ',this)">おもちゃ</div>
          <div class="chip" onclick="filt('シュシュ',this)">シュシュ</div>
          <div class="chip" onclick="filt('花火',this)">花火</div>
          <div class="chip" onclick="filt('かざ車',this)">かざ車</div>
          <div class="chip" onclick="filt('おとこのこぶき',this)">おとこぶき</div>
          <div class="chip" onclick="filt('おんなのこぶき',this)">おんなぶき</div>
        </div>
        <div id="il"></div>
      </div>

      <!-- チェックタブ -->
      <div id="tab-check" class="section">
        <div class="ck-card" style="margin-bottom:0.75rem">
          <p style="font-size:13px;color:#888">イベント前チェックリスト — バリエーション別在庫</p>
        </div>
        <div id="cl"></div>
      </div>

    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA2ySQxuXoL3Vg-Fn8HKA_oyd1BHmqo03I",
  authDomain: "dagashi-inventory.firebaseapp.com",
  projectId: "dagashi-inventory",
  storageBucket: "dagashi-inventory.firebasestorage.app",
  messagingSenderId: "1038759847620",
  appId: "1:1038759847620:web:798667090bdec2a73b0b91"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const col = db.collection('items');

let items = [], img = null, rec = null, curTab = 'add', cf = 'all';
let formVars = []; // カスタムバリエーション [{name:'', count:0}]
let editingId = null;
const LOC_NAMES = ['渋谷', '出町柳', '新町御池', '円町'];
let locCounts = {}; // 場所カウント {渋谷:0, ...}

// ===== リアルタイム同期 =====
col.orderBy('createdAt','asc').onSnapshot(snap => {
  items = snap.docs.map(d => ({id: d.id, ...d.data()}));
  const b = document.getElementById('syncBadge');
  b.textContent = '✓ 同期済み'; b.className = 'sync-badge ok';
  if(curTab === 'list') rl();
  if(curTab === 'check') rc();
}, err => {
  const b = document.getElementById('syncBadge');
  b.textContent = '接続エラー'; b.className = 'sync-badge err';
});

// ===== タブ =====
function sw(n) {
  curTab = n;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.getAttribute('onclick') === "sw('"+n+"')");
  });
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-'+n).classList.add('active');
  if(n==='list') rl();
  if(n==='check') rc();
}

// ===== 写真 =====
function prevImg(i) {
  if(!i.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const imgEl = new Image();
    imgEl.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 400;
      let w = imgEl.width, h = imgEl.height;
      if(w > h && w > MAX){ h = Math.round(h*MAX/w); w = MAX; }
      else if(h > MAX){ w = Math.round(w*MAX/h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(imgEl, 0, 0, w, h);
      img = canvas.toDataURL('image/jpeg', 0.65);
      const iv = document.getElementById('iv');
      iv.src = img; iv.style.display = 'block';
      document.getElementById('ip').style.display = 'none';
    };
    imgEl.src = e.target.result;
  };
  reader.readAsDataURL(i.files[0]);
}

// ===== 音声 =====
function mic() {
  const b = document.getElementById('mb'), l = document.getElementById('ml');
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
    alert('このブラウザは音声入力に対応していません'); return;
  }
  if(rec){ rec.stop(); rec=null; b.classList.remove('rec'); l.textContent='音声で入力'; return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  rec = new SR(); rec.lang = 'ja-JP';
  rec.onresult = e => { document.getElementById('nm').value = e.results[0][0].transcript; };
  rec.onend = () => { rec=null; b.classList.remove('rec'); l.textContent='音声で入力'; };
  rec.start(); b.classList.add('rec'); l.textContent = '聞いてるよ...';
}

// ===== バリエーション入力フォーム =====
function renderFormVars() {
  const el = document.getElementById('varList');
  el.innerHTML = formVars.map((v, i) => `
    <div class="var-row">
      <button class="var-mic" id="vm-${i}" onclick="micVar(${i})" title="音声入力（例：みどり 3）">🎤</button>
      <input class="var-name" type="text" placeholder="色・種類（例：緑）" value="${v.name}"
        oninput="formVars[${i}].name=this.value">
      <div class="var-ctrl">
        <div class="var-btn" onclick="fvc(${i},-1)">−</div>
        <div class="var-num" id="fvn-${i}">${v.count}</div>
        <div class="var-btn" onclick="fvc(${i},1)">＋</div>
      </div>
      <button class="var-del" onclick="delVar(${i})" title="削除">✕</button>
    </div>`).join('');
}

let varRec = null, varRecIdx = -1;
function micVar(i) {
  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
    alert('このブラウザは音声入力に対応していません'); return;
  }
  // 別のバリエーションのマイクが動いてたら止める
  if(varRec) { varRec.stop(); varRec = null; }
  const btn = document.getElementById('vm-'+i);
  if(varRecIdx === i && btn && !btn.classList.contains('rec')) {
    // already stopped
  }
  varRecIdx = i;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  varRec = new SR(); varRec.lang = 'ja-JP';
  varRec.onresult = e => {
    const txt = e.results[0][0].transcript.trim();
    // 数字（半角・漢数字）を変換
    const kanji = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'十一':11,'十二':12,'十三':13,'十四':14,'十五':15,'十六':16,'十七':17,'十八':18,'十九':19,'二十':20};
    let normalized = txt;
    Object.keys(kanji).sort((a,b)=>b.length-a.length).forEach(k => {
      normalized = normalized.replace(new RegExp(k,'g'), kanji[k]);
    });
    // パターン：「名前 数字」「数字 名前」「名前数字」いずれも対応（スペース有無問わず）
    const m = normalized.match(/^(.+?)[\s　]*(\d+)個?$/) ||
              normalized.match(/^(\d+)個?[\s　]*(.+?)$/) ||
              normalized.match(/^(.+?)(\d+)個?$/);
    if(m) {
      const p1isNum = /^\d+$/.test(m[1]);
      const name = p1isNum ? m[2].trim() : m[1].trim();
      const count = parseInt(p1isNum ? m[1] : m[2]);
      if(name) formVars[i].name = name;
      formVars[i].count = Math.max(0, count);
    } else if(/^\d+$/.test(normalized)) {
      // 数字だけ → 個数のみ更新
      formVars[i].count = Math.max(0, parseInt(normalized));
    } else {
      // テキストだけ → 名前のみ更新
      formVars[i].name = txt;
    }
    renderFormVars();
  };
  varRec.onend = () => {
    varRec = null; varRecIdx = -1;
    const b = document.getElementById('vm-'+i);
    if(b) b.classList.remove('rec');
  };
  varRec.start();
  if(btn) btn.classList.add('rec');
}

function addVar() {
  formVars.push({name:'', count:0});
  renderFormVars();
}

function delVar(i) {
  formVars.splice(i, 1);
  renderFormVars();
}

function fvc(i, d) {
  formVars[i].count = Math.max(0, formVars[i].count + d);
  document.getElementById('fvn-'+i).textContent = formVars[i].count;
}

// ===== 場所選択 =====
function initLocs(preset) {
  LOC_NAMES.forEach(n => { locCounts[n] = (preset && preset[n]) || 0; });
  renderLocs();
}
function renderLocs() {
  const el = document.getElementById('locList');
  el.innerHTML = LOC_NAMES.map(loc => `
    <div class="loc-chip${locCounts[loc]>0?' active':''}" id="lchip-${loc}">
      <div class="loc-chip-name">${loc}</div>
      <div class="loc-ctrl">
        <div class="var-btn" onclick="lvc('${loc}',-1)">−</div>
        <div class="loc-num" id="ln-${loc}">${locCounts[loc]}</div>
        <div class="var-btn" onclick="lvc('${loc}',1)">＋</div>
      </div>
    </div>`).join('');
}
function lvc(loc, d) {
  locCounts[loc] = Math.max(0, (locCounts[loc]||0) + d);
  const el = document.getElementById('ln-'+loc);
  if(el) el.textContent = locCounts[loc];
  const chip = document.getElementById('lchip-'+loc);
  if(chip) chip.className = 'loc-chip' + (locCounts[loc]>0?' active':'');
}

// 初期バリエーション（カスタム：1行空欄）
function initVars() {
  formVars = [{name:'', count:0}];
  renderFormVars();
}
initLocs();
initVars();

// ===== 保存 / 更新 =====
async function save() {
  const n = document.getElementById('nm').value.trim();
  if(!n){ alert('商品名を入力してください'); return; }
  // 場所（選択式）+ カスタムバリエーション を合わせる
  const locVars = LOC_NAMES.filter(l => locCounts[l] > 0).map(l => ({name:l, count:locCounts[l]}));
  const customVars = formVars.filter(v => v.name.trim() !== '').map(v => ({name:v.name.trim(), count:v.count}));
  const vars = [...locVars, ...customVars];
  const btn = document.getElementById('saveBtn');
  const isEdit = !!editingId;
  btn.disabled = true; btn.textContent = isEdit ? '更新中...' : '保存中...';
  try {
    const data = {
      name: n,
      cat: document.getElementById('ct').value,
      variants: vars
    };
    if(img) data.img = img; // 画像が差し替えられた場合のみ更新
    if(isEdit) {
      await col.doc(editingId).update(data);
      alert(n + ' を更新したおいっす！');
    } else {
      data.img = img || null;
      data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
      await col.add(data);
      alert(n + ' を保存したおいっす！');
    }
    resetForm();
  } catch(e) {
    alert('失敗したおいっす: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = editingId ? '更新する' : '保存する';
  }
}

function resetForm() {
  editingId = null;
  document.getElementById('nm').value = '';
  const iv = document.getElementById('iv');
  iv.style.display = 'none'; iv.src = '';
  document.getElementById('ip').style.display = '';
  document.getElementById('ii').value = '';
  img = null;
  initLocs();
  initVars();
  document.getElementById('saveBtn').textContent = '保存する';
  const cb = document.getElementById('cancelEditBtn');
  if(cb) cb.style.display = 'none';
}

function editItem(id) {
  const it = items.find(i => i.id === id);
  if(!it) return;
  editingId = id;
  // フォームに値をセット
  document.getElementById('nm').value = it.name || '';
  const ct = document.getElementById('ct');
  if(it.cat) ct.value = it.cat;
  // 画像
  img = it.img || null;
  const iv = document.getElementById('iv');
  if(it.img){ iv.src = it.img; iv.style.display = 'block'; document.getElementById('ip').style.display = 'none'; }
  else { iv.style.display = 'none'; document.getElementById('ip').style.display = ''; }
  // バリエーション：場所とカスタムに分ける
  const allVars = getVars(it);
  const preset = {};
  LOC_NAMES.forEach(n => { preset[n] = 0; });
  const custom = [];
  allVars.forEach(v => {
    if(LOC_NAMES.includes(v.name)) preset[v.name] = v.count||0;
    else custom.push({name:v.name, count:v.count||0});
  });
  initLocs(preset);
  formVars = custom.length ? custom : [{name:'', count:0}];
  renderFormVars();
  // ボタン表示変更
  document.getElementById('saveBtn').textContent = '更新する';
  const cb = document.getElementById('cancelEditBtn');
  if(cb) cb.style.display = 'block';
  // 登録タブに切り替え
  sw('add');
  window.scrollTo(0, 0);
}

// ===== 一覧 =====
function filt(f, el) {
  cf = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active'); rl();
}

function getVars(it) {
  // 新形式: variants配列
  if(it.variants && it.variants.length) return it.variants;
  // 旧形式: sh/shin/dema/maru フィールド → 変換して表示
  const old = [];
  const LOCS = {sh:'渋谷', shin:'新町御池', dema:'出町柳', maru:'円町'};
  Object.keys(LOCS).forEach(k => { if(it[k]) old.push({name: LOCS[k], count: it[k]}); });
  return old;
}

function getTotal(it) {
  return getVars(it).reduce((s, v) => s + (v.count||0), 0);
}

function rl() {
  const el = document.getElementById('il');
  const fl = cf==='all' ? items : items.filter(i => i.cat===cf);
  if(!fl.length){ el.innerHTML = '<div class="empty">まだ登録がないおいっす</div>'; return; }
  el.innerHTML = fl.map(it => {
    const vars = getVars(it);
    const tot = getTotal(it);
    const badges = vars.map(v => `<span class="vbdg">${v.name} <b>${v.count||0}</b></span>`).join('') +
      `<span class="vbdg tot">計 <b id="vbt-${it.id}">${tot}</b></span>`;
    const editRows = vars.map((v, vi) => `
      <div class="vedit-row">
        <span class="vedit-lbl">${v.name}</span>
        <div class="vicb" onclick="uv('${it.id}',${vi},-1)">−</div>
        <div class="vicn" id="vn-${it.id}-${vi}">${v.count||0}</div>
        <div class="vicb" onclick="uv('${it.id}',${vi},1)">＋</div>
      </div>`).join('');
    return `<div class="item-card">
      <div class="thumb">${it.img ? `<img src="${it.img}" alt="${it.name}">` : '📦'}</div>
      <div class="iinfo">
        <div class="iname">${it.name}</div>
        <div class="icat">${it.cat}</div>
        <div class="vbadges">${badges}</div>
        <div class="vedit">${editRows}</div>
        <div class="item-actions">
          <button class="edit-btn" onclick="editItem('${it.id}')">✏️ 編集</button>
          <button class="del-btn" onclick="deleteItem('${it.id}')">🗑️ 削除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== 削除 =====
async function deleteItem(id) {
  const it = items.find(i => i.id === id);
  const name = it ? it.name : 'この商品';
  if(!confirm(name + ' を削除しますか？')) return;
  try {
    await col.doc(id).delete();
  } catch(e) {
    alert('削除に失敗したおいっす: ' + e.message);
  }
}

// ===== バリエーション在庫更新 =====
async function uv(id, vi, d) {
  const it = items.find(i => i.id===id); if(!it) return;
  const vars = it.variants ? [...it.variants] : getVars(it).map(v => ({...v}));
  if(!vars[vi]) return;
  vars[vi].count = Math.max(0, (vars[vi].count||0) + d);
  it.variants = vars;
  // DOM即時反映
  const numEl = document.getElementById('vn-'+id+'-'+vi);
  if(numEl) numEl.textContent = vars[vi].count;
  const tot = vars.reduce((s,v) => s+(v.count||0), 0);
  const totEl = document.getElementById('vbt-'+id);
  if(totEl) totEl.textContent = tot;
  // Firestore更新
  try { await col.doc(id).update({variants: vars}); }
  catch(e){ console.error(e); }
}

// ===== チェックリスト =====
function rc() {
  const el = document.getElementById('cl');
  if(!items.length){ el.innerHTML = '<div class="empty">在庫がまだ登録されていないおいっす</div>'; return; }
  const cats = [...new Set(items.map(i => i.cat))];
  el.innerHTML = cats.map(cat => {
    const rows = items.filter(i => i.cat===cat).map(it => {
      const vars = getVars(it);
      const tot = getTotal(it);
      const varBadges = vars.map(v => `<span class="ck-vbdg">${v.name} ${v.count||0}</span>`).join('');
      return `<div class="ck-row">
        <div class="ck-th">${it.img ? `<img src="${it.img}">` : '📦'}</div>
        <div class="ck-body">
          <div class="ck-name">${it.name}</div>
          <div class="ck-vars">${varBadges || '<span style="font-size:10px;color:#ccc">バリエーションなし</span>'}</div>
        </div>
        <div class="ck-tot${tot===0?' zero':''}">${tot}</div>
      </div>`;
    }).join('');
    return `<div class="ck-card"><div class="ck-cat">${cat}</div>${rows}</div>`;
  }).join('');
}
</script>
